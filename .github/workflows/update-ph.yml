name: Update Product Hunt Data

on:
  schedule:
    # Run daily at UTC 22:00 (Beijing time 06:00 next day)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  fetch-ph:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
          sudo apt-get install -y xvfb

      - name: Fetch Product Hunt data
        run: xvfb-run python3 scripts/fetch_ph.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ph_products.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Product Hunt data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
